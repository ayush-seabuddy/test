name: EAS Build and Deploy

on:
  push:
    branches:
      - feature/expo-migration
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - production
          - preview
      submit:
        description: 'Auto-submit to stores'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: EAS Build and Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./expo-app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expo-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Get build parameters
        id: params
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          SUBMIT="${{ github.event.inputs.submit || 'true' }}"
          
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT
          echo "submit=$SUBMIT" >> $GITHUB_OUTPUT
          
          echo "Building for platform: $PLATFORM with profile: $PROFILE"

      - name: Build on EAS
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ steps.params.outputs.submit }}" == "true" ]; then
            eas build --platform ${{ steps.params.outputs.platform }} --profile ${{ steps.params.outputs.profile }} --non-interactive --no-wait --auto-submit
          else
            eas build --platform ${{ steps.params.outputs.platform }} --profile ${{ steps.params.outputs.profile }} --non-interactive --no-wait
          fi

      - name: Build Summary
        run: |
          echo "✅ Build triggered successfully!"
          echo "Platform: ${{ steps.params.outputs.platform }}"
          echo "Profile: ${{ steps.params.outputs.profile }}"
          echo "Auto-submit: ${{ steps.params.outputs.submit }}"
          echo ""
          echo "Monitor your build at: https://expo.dev/accounts/seabuddyco1/projects/SeaBuddy/builds"
