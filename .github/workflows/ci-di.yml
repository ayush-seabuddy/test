name: React Native CI/CD

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Deployment environment"
        default: "preview"
        options:
          - development
          - preview
          - production
      platform:
        type: choice
        description: "Platform to build"
        default: "all"
        options:
          - android
          - ios
          - all
      submit_to_stores:
        type: boolean
        description: "Submit to app stores (production only)"
        default: false

env:
  NODE_VERSION: "20"
  NODE_OPTIONS: "--openssl-legacy-provider --max-old-space-size=8192"
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ================================
  # Quality Gates
  # ================================

  quality-checks:
    name: Quality Checks & Tests
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Validate TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

      - name: 🧹 Run ESLint
        run: npm run lint
        continue-on-error: true

  # ================================
  # Android Builds (Using Reusable Workflow)
  # ================================

  build-android-development:
    name: Build Android Development
    needs: quality-checks
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all') && inputs.environment == 'development') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/build-android.yml
    with:
      profile: development
      artifact-name: android-development-apk
      retention-days: 30
      node-version: "20"
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-android-preview:
    name: Build Android Preview
    needs: quality-checks
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all') && inputs.environment == 'preview') ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    uses: ./.github/workflows/build-android.yml
    with:
      profile: preview
      artifact-name: android-preview-apk
      retention-days: 30
      node-version: "20"
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-android-production:
    name: Build Android Production
    needs: quality-checks
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all') && inputs.environment == 'production')
    uses: ./.github/workflows/build-android.yml
    with:
      profile: production
      artifact-name: android-production-aab
      retention-days: 90
      node-version: "20"
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ================================
  # iOS Builds (Using Reusable Workflow)
  # ================================

  build-ios-development:
    name: Build iOS Development
    needs: quality-checks
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all') && inputs.environment == 'development') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/build-ios.yml
    with:
      profile: development
      artifact-name: ios-development-simulator
      retention-days: 30
      node-version: "20"
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-ios-preview:
    name: Build iOS Preview
    needs: quality-checks
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all') && inputs.environment == 'preview') ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    uses: ./.github/workflows/build-ios.yml
    with:
      profile: preview
      artifact-name: ios-preview-simulator
      retention-days: 30
      node-version: "20"
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-ios-production:
    name: Build iOS Production
    needs: quality-checks
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all') && inputs.environment == 'production')
    uses: ./.github/workflows/build-ios.yml
    with:
      profile: production
      artifact-name: ios-production-ipa
      retention-days: 90
      node-version: "20"
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ================================
  # Release & Distribution
  # ================================

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android-development
      - build-android-preview
      - build-android-production
      - build-ios-development
      - build-ios-preview
      - build-ios-production
    # Only run if at least one build succeeded and no build failed
    if: |
      always() &&
      (needs.build-android-development.result == 'success' ||
       needs.build-android-preview.result == 'success' ||
       needs.build-android-production.result == 'success' ||
       needs.build-ios-development.result == 'success' ||
       needs.build-ios-preview.result == 'success' ||
       needs.build-ios-production.result == 'success') &&
      !contains(needs.*.result, 'failure')

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏷️ Generate build metadata
        id: metadata
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
          ENVIRONMENT="${{ github.event.inputs.environment || 'preview' }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "release_tag=v${VERSION}-${ENVIRONMENT}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

          # Generate changelog
          if git describe --tags --abbrev=0 2>/dev/null; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            echo "## Changes since $LAST_TAG" > changelog.md
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%an)" --no-merges >> changelog.md
          else
            echo "## Recent Changes" > changelog.md
            git log --pretty=format:"- %s (%an)" --no-merges -n 20 >> changelog.md
          fi

          # Add build info to changelog
          echo "" >> changelog.md
          echo "## Build Information" >> changelog.md
          echo "- **Version**: $VERSION" >> changelog.md
          echo "- **Environment**: $ENVIRONMENT" >> changelog.md
          echo "- **Build Number**: $BUILD_NUMBER" >> changelog.md
          echo "- **Branch**: ${{ github.ref_name }}" >> changelog.md
          echo "- **Commit**: ${{ github.sha }}" >> changelog.md

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: 📋 List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lR ./release-artifacts

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Release v${{ steps.metadata.outputs.version }} (${{ steps.metadata.outputs.environment }})"
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          body_path: changelog.md
          files: |
            ./release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  submit-to-stores:
    name: Submit to App Stores
    runs-on: ubuntu-latest
    needs:
      - build-android-production
      - build-ios-production
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.environment == 'production' &&
      inputs.submit_to_stores == true &&
      needs.build-android-production.result == 'success' &&
      needs.build-ios-production.result == 'success'

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download Android Production AAB
        uses: actions/download-artifact@v4
        with:
          name: android-production-aab
          path: ./artifacts

      - name: 📥 Download iOS Production IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-production-ipa
          path: ./artifacts

      - name: 🚀 Submit to Google Play Store
        run: |
          eas submit \
            --platform android \
            --path ./artifacts/app-android-production.aab \
            --profile production \
            --non-interactive
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}

      - name: 🚀 Submit to Apple App Store
        run: |
          eas submit \
            --platform ios \
            --path ./artifacts/app-ios-production.ipa \
            --profile production \
            --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}

  # ================================
  # Notifications
  # ================================

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs:
      - quality-checks
      - create-release
    if: always()

    steps:
      - name: 📢 Determine success status
        id: status
        run: |
          if [[ "${{ needs.quality-checks.result }}" == "success" && ("${{ needs.create-release.result }}" == "success" || "${{ needs.create-release.result }}" == "skipped") ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "message=Pipeline completed successfully ✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "message=Pipeline failed ❌" >> $GITHUB_OUTPUT
          fi

      - name: 📢 Notify via Slack (if configured)
        if: env.SLACK_WEBHOOK != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ steps.status.outputs.color }}
          SLACK_TITLE: CI/CD Pipeline
          SLACK_MESSAGE: ${{ steps.status.outputs.message }}
          SLACK_FOOTER: "Repository: ${{ github.repository }} | Branch: ${{ github.ref_name }}"
